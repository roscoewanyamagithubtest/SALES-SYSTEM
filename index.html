
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoscoeBot Pro | Unified Terminal</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --blue: #58a6ff; --green: #238636; --red: #da3633; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 500px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 25px; box-shadow: 0 10px 50px rgba(0,0,0,0.7); }
        h1 { color: var(--blue); margin: 0 0 5px 0; font-size: 28px; letter-spacing: -1px; }
        .status-bar { display: flex; align-items: center; justify-content: center; font-size: 13px; margin-bottom: 20px; color: #8b949e; }
        .dot { height: 10px; width: 10px; background: #444; border-radius: 50%; margin-right: 8px; transition: 0.3s; }
        .dot.active { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; color: white; }
        .btn-start { background: var(--green); }
        .btn-close { background: var(--red); }
        .btn-auth { background: var(--blue); }
        .news-banner { display: none; background: rgba(241, 224, 90, 0.1); border: 1px solid #f1e05a; color: #f1e05a; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; font-weight: 500; }
        #log-window { background: #010409; border: 1px solid var(--border); border-radius: 8px; height: 150px; overflow-y: auto; text-align: left; padding: 15px; font-family: monospace; font-size: 12px; margin-top: 20px; line-height: 1.5; color: #7d8590; }
        input[type="password"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #0d1117; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .auth-screen { display: block; }
        .main-screen { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-screen" class="auth-screen">
            <h1>RoscoeBot Login</h1>
            <p style="color:#8b949e">Enter security key to access bridge</p>
            <input type="password" id="pass" placeholder="Password">
            <button class="btn btn-auth" onclick="authenticate()">UNLOCK TERMINAL</button>
        </div>

        <div id="main-screen" class="main-screen">
            <h1>RoscoeBot Pro</h1>
            <div class="status-bar"><span id="indicator" class="dot"></span> <span id="status-text">MT5 Disconnected</span></div>
            
            <div id="news-alert" class="news-banner">⚠️ HIGH IMPACT NEWS DETECTED - LOGIC PAUSED</div>

            <button class="btn btn-start" onclick="trigger('start')">START SMC ENGINE</button>
            <button class="btn btn-close" onclick="trigger('close_all')">EMERGENCY: LIQUIDATE ALL</button>
            <button class="btn" style="background:#21262d" onclick="trigger('stop')">SHUTDOWN SYSTEM</button>

            <div id="log-window">System Ready...</div>
        </div>
    </div>

    <script>
        let sessionKey = "";

        async function authenticate() {
            const p = document.getElementById('pass').value;
            const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({pass: p}) });
            const data = await res.json();
            if(data.success) {
                sessionKey = p;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'block';
            } else { alert("Wrong Password!"); }
        }

        async function trigger(action) {
            const res = await fetch(`/${action}?pass=${sessionKey}`);
            const data = await res.json();
            const logs = document.getElementById('log-window');
            logs.innerHTML += `<br>[${new Date().toLocaleTimeString()}] ${data.message}`;
            logs.scrollTop = logs.scrollHeight;

            if(data.running) {
                document.getElementById('indicator').classList.add('active');
                document.getElementById('status-text').innerText = "MT5 Active | Trading...";
            } else {
                document.getElementById('indicator').classList.remove('active');
                document.getElementById('status-text').innerText = "MT5 Disconnected";
            }
            document.getElementById('news-alert').style.display = data.news_impact ? 'block' : 'none';
        }
    </script>
</body>
</html>
